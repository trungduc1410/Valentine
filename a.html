<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Love Riz❤️</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: "Poppins", sans-serif;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #pinkboard {
      animation: anim 1.5s ease-in-out infinite;
    }

    @keyframes anim {
      0%, 100% { transform: scale(0.8); }
      50% { transform: scale(1); }
    }

    #birthdayText {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff99c8;
      font-size: 48px;
      font-weight: bold;
      text-shadow: 0 0 20px #ff5ea0, 0 0 40px #ff5ea0;
      text-align: center;
      animation: glow 2s ease-in-out infinite alternate;
      z-index: 5;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #ff5ea0, 0 0 20px #ff5ea0; }
      to { text-shadow: 0 0 30px #ff5ea0, 0 0 60px #ff5ea0; }
    }
  </style>
</head>

<body>
  <canvas id="pinkboard"></canvas>

  <canvas id="canvas"></canvas>

  <canvas id="fireworks"></canvas>

  

  <div id="..........Text"> ❤️ </div>

  <script>
    
    const colors = ["#ff8e70","#eec996","#8fb7d3","#b7d4c6","#c3bedd","#f1d5e4","#cae1d3","#f3c89d","#d0b0c3","#819d53"];
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let ww = window.innerWidth, wh = window.innerHeight;
    canvas.width = ww; canvas.height = wh;

    class Heart {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * ww;
        this.y = Math.random() * wh;
        this.opacity = Math.random() * 0.5 + 0.5;
        this.vel = { x: (Math.random() - 0.5) * 4, y: (Math.random() - 0.5) * 4 };
        this.targetScale = Math.random() * 0.15 + 0.02;
        this.scale = this.targetScale * Math.random();
        this.color = colors[Math.floor(Math.random() * colors.length)];
      }
      update() {
        this.x += this.vel.x;
        this.y += this.vel.y;
        if (this.x < -100 || this.y < -100 || this.x > ww + 100 || this.y > wh + 100) this.reset();
      }
      draw() {
        ctx.globalAlpha = this.opacity;
        ctx.font = `${180 * this.scale}px "Poppins"`;
        ctx.fillStyle = this.color;
        ctx.fillText("❤️❤️ LOVE RIZ FOREVER ❤️❤️", this.x, this.y);
      }
    }

    const hearts = Array.from({ length: 60 }, () => new Heart());
    function animateText() {
      ctx.clearRect(0, 0, ww, wh);
      hearts.forEach(h => { h.update(); h.draw(); });
      requestAnimationFrame(animateText);
    }
    animateText();

  
    const fireworksCanvas = document.getElementById("fireworks");
    const fctx = fireworksCanvas.getContext("2d");
    fireworksCanvas.width = ww;
    fireworksCanvas.height = wh;

    const fireworks = [];
    class Firework {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * ww;
        this.y = Math.random() * wh / 2;
        this.particles = [];
        for (let i = 0; i < 40; i++) {
          const angle = (Math.PI * 2 * i) / 40;
          const speed = Math.random() * 4 + 2;
          this.particles.push({
            x: this.x, y: this.y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            alpha: 1,
            color: `hsl(${Math.random() * 360},100%,60%)`
          });
        }
      }
      update() {
        this.particles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.02;
          p.alpha -= 0.01;
        });
        this.particles = this.particles.filter(p => p.alpha > 0);
        if (this.particles.length === 0) this.reset();
      }
      draw() {
        this.particles.forEach(p => {
          fctx.globalAlpha = p.alpha;
          fctx.fillStyle = p.color;
          fctx.beginPath();
          fctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
          fctx.fill();
        });
      }
    }

    for (let i = 0; i < 10; i++) fireworks.push(new Firework());
    function animateFireworks() {
      fctx.clearRect(0, 0, ww, wh);
      fireworks.forEach(f => { f.update(); f.draw(); });
      requestAnimationFrame(animateFireworks);
    }
    animateFireworks();

  
    const bubblesCanvas = document.getElementById("bubbles");
    const bctx = bubblesCanvas.getContext("2d");
    bubblesCanvas.width = ww;
    bubblesCanvas.height = wh;

    const bubbles = [];
    class Bubble {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * ww;
        this.y = wh + Math.random() * wh;
        this.radius = Math.random() * 10 + 4;
        this.speed = Math.random() * 2 + 1;
        this.color = `rgba(${Math.floor(Math.random()*255)},${Math.floor(Math.random()*255)},255,0.5)`;
      }
      update() {
        this.y -= this.speed;
        if (this.y + this.radius < 0) this.reset();
      }
      draw() {
        bctx.beginPath();
        bctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        bctx.fillStyle = this.color;
        bctx.fill();
      }
    }

    for (let i = 0; i < 100; i++) bubbles.push(new Bubble());
    function animateBubbles() {
      bctx.clearRect(0, 0, ww, wh);
      bubbles.forEach(b => { b.update(); b.draw(); });
      requestAnimationFrame(animateBubbles);
    }
    animateBubbles();

    (function (canvas) {
      var context = canvas.getContext("2d"),
        settings = { particles: { length: 500, duration: 2, velocity: 100, effect: -0.75, size: 30 } },
        Point = function (x, y) { this.x = x || 0; this.y = y || 0; };
      Point.prototype.length = function (length) {
        if (typeof length == "undefined") return Math.sqrt(this.x * this.x + this.y * this.y);
        this.normalize(); this.x *= length; this.y *= length; return this;
      };
      Point.prototype.normalize = function () {
        var length = this.length(); this.x /= length; this.y /= length; return this;
      };

      var Particle = function () {
        this.position = new Point(); this.velocity = new Point(); this.acceleration = new Point(); this.age = 0;
      };
      Particle.prototype.initialize = function (x, y, dx, dy) {
        this.position.x = x; this.position.y = y; this.velocity.x = dx; this.velocity.y = dy;
        this.acceleration.x = dx * settings.particles.effect;
        this.acceleration.y = dy * settings.particles.effect; this.age = 0;
      };
      Particle.prototype.update = function (dt) {
        this.position.x += this.velocity.x * dt; this.position.y += this.velocity.y * dt;
        this.velocity.x += this.acceleration.x * dt; this.velocity.y += this.acceleration.y * dt; this.age += dt;
      };
      Particle.prototype.draw = function (ctx, image) {
        function ease(t) { return --t * t * t + 1; }
        var size = image.width * ease(this.age / settings.particles.duration);
        ctx.globalAlpha = 1 - this.age / settings.particles.duration;
        ctx.drawImage(image, this.position.x - size / 2, this.position.y - size / 2, size, size);
      };

      var particles = [];
      for (var i = 0; i < settings.particles.length; i++) particles.push(new Particle());
      function pointOnHeart(t) {
        return new Point(160 * Math.pow(Math.sin(t), 3),
          130 * Math.cos(t) - 50 * Math.cos(2 * t) - 20 * Math.cos(3 * t) - 10 * Math.cos(4 * t) + 25);
      }

      var image = (function () {
        var c = document.createElement("canvas"), ctx2 = c.getContext("2d");
        c.width = settings.particles.size; c.height = settings.particles.size;
        ctx2.beginPath();
        var t = -Math.PI, point = to(t);
        function to(t) {
          var p = pointOnHeart(t);
          p.x = settings.particles.size / 2 + (p.x * settings.particles.size) / 350;
          p.y = settings.particles.size / 2 - (p.y * settings.particles.size) / 350;
          return p;
        }
        ctx2.moveTo(point.x, point.y);
        while (t < Math.PI) { t += 0.01; point = to(t); ctx2.lineTo(point.x, point.y); }
        ctx2.closePath(); ctx2.fillStyle = "#ff80b5"; ctx2.fill();
        var img = new Image(); img.src = c.toDataURL(); return img;
      })();

      var lastTime = Date.now();
      function render() {
        requestAnimationFrame(render);
        var now = Date.now(), dt = (now - lastTime) / 1000; lastTime = now;
        context.clearRect(0, 0, canvas.width, canvas.height);
        var amount = settings.particles.length / settings.particles.duration * dt;
        for (var i = 0; i < amount; i++) {
          var pos = pointOnHeart(Math.PI - 2 * Math.PI * Math.random());
          var dir = pos.length(settings.particles.velocity);
          particles[i % particles.length].initialize(canvas.width / 2 + pos.x, canvas.height / 2 - pos.y, dir.x, -dir.y);
        }
        particles.forEach(p => { p.update(dt); p.draw(context, image); });
      }

      function onResize() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      }
      window.onresize = onResize; onResize(); render();
    })(document.getElementById("pinkboard"));
  </script>
</body>
</html>
